services:
  # ===========================================
  # Layer 1: Context Store
  # ===========================================
  context-store:
    build:
      context: ../pci-context-store
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - context-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8081
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pci-network

  # ===========================================
  # Layer 2: Personal Agent
  # ===========================================
  agent:
    build:
      context: ../pci-agent
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    volumes:
      - ${MODEL_PATH:-./models}:/app/models:ro
    environment:
      - CONTEXT_STORE_URL=http://context-store:8081
      - MODEL_PATH=/app/models/${MODEL_FILE:-phi-3-mini-q4.gguf}
      - PORT=8082
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      context-store:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pci-network

  # ===========================================
  # Layer 4: ZKP Service
  # ===========================================
  zkp:
    build:
      context: ../pci-zkp
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - MIDNIGHT_NETWORK=${MIDNIGHT_NETWORK:-preprod}
      - MIDNIGHT_INDEXER_URL=${MIDNIGHT_INDEXER_URL:-http://midnight-indexer:8088/api/v3/graphql}
      - MIDNIGHT_INDEXER_WS_URL=${MIDNIGHT_INDEXER_WS_URL:-ws://midnight-indexer:8088/api/v3/graphql/ws}
      - MIDNIGHT_NODE_URL=${MIDNIGHT_NODE_URL:-http://midnight-node:9944}
      - MIDNIGHT_PROOF_SERVER_URL=${MIDNIGHT_PROOF_SERVER_URL:-http://midnight-proof-server:6300}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pci-network

  # ===========================================
  # Cardano Node (Optional - use profile)
  # Connects to preview testnet
  # ===========================================
  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:9.2.1
    ports:
      - "3001:3001"
    volumes:
      - cardano-data:/data
      - cardano-ipc:/ipc
      - ./services/cardano/config:/config:ro
    environment:
      - CARDANO_NODE_SOCKET_PATH=/ipc/node.socket
    command: >
      run
      --topology /config/topology.json
      --database-path /data/db
      --socket-path /ipc/node.socket
      --config /config/config.json
    profiles:
      - cardano-testnet
      - with-nodes
    networks:
      - pci-network

  # ===========================================
  # Midnight Proof Server
  # Required for ZK proof generation
  # Pre-baked ZK params, Ledger v7
  # ===========================================
  midnight-proof-server:
    image: midnightntwrk/proof-server:7.0.0
    ports:
      - "6300:6300"
    command: ["midnight-proof-server", "-v"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6300/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pci-network

  # ===========================================
  # Midnight Standalone (for local testing)
  # Runs node + indexer + proof-server isolated
  # Ledger v7 images from midnightntwrk registry
  # ===========================================
  midnight-node:
    image: midnightntwrk/midnight-node:0.20.0
    ports:
      - "9944:9944"
    volumes:
      - midnight-data:/data
    environment:
      - CFG_PRESET=${MIDNIGHT_CFG_PRESET:-dev}
    profiles:
      - with-midnight
      - with-nodes
      - standalone
    networks:
      - pci-network

  midnight-indexer:
    image: midnightntwrk/indexer-standalone:3.0.0
    ports:
      - "8088:8088"
    environment:
      - CFG_PRESET=${MIDNIGHT_CFG_PRESET:-dev}
      - APP__APPLICATION__NETWORK_ID=${MIDNIGHT_NETWORK_ID:-undeployed}
      - APP__INFRA__STORAGE__PASSWORD=${INDEXER_STORAGE_PASSWORD:-indexer}
      - APP__INFRA__PUB_SUB__PASSWORD=${INDEXER_PUBSUB_PASSWORD:-indexer}
      - APP__INFRA__LEDGER_STATE_STORAGE__PASSWORD=${INDEXER_LEDGER_PASSWORD:-indexer}
    depends_on:
      - midnight-node
    profiles:
      - with-midnight
      - with-nodes
      - standalone
    networks:
      - pci-network

networks:
  pci-network:
    driver: bridge

volumes:
  context-data:
  cardano-data:
  cardano-ipc:
  midnight-data:
